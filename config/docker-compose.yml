services:
  friday:
    build:
      context: ..
      dockerfile: config/Dockerfile
    container_name: friday-animateme
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../workspace:/home/node/.openclaw/workspace
      - ../pipeline:/home/node/.openclaw/pipeline
      - friday-data:/data
    ports:
      - "3001:3000"
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - CREWAI_VENV=/home/node/crewai-env
      - FRIDAY_DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  friday-data:
