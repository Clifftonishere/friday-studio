services:
  friday:
    build:
      context: ..
      dockerfile: config/Dockerfile
    container_name: friday-animateme
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - friday-data:/data
    ports:
      - "8000:8000"
    environment:
      - FRIDAY_DATA_DIR=/data
      - FRIDAY_FRONTEND_DIR=/srv/frontend

volumes:
  friday-data:
